kind = "web"
previewPath = "/"
title = "Tennis Live Odds Calculator"
version = "1.0.0"
id = "artifacts/tennis-odds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24481

[services.development]
run = "pnpm --filter @workspace/tennis-odds run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tennis-odds", "run", "build" ]
publicDir = "artifacts/tennis-odds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24481"
BASE_PATH = "/"
